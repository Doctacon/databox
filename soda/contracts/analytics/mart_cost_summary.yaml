dataset: databox/analytics/mart_cost_summary

columns:
  - name: day_date
    checks:
      - missing:
          must_be: 0
  - name: backend
    checks:
      - missing:
          must_be: 0
      - invalid:
          valid_values: [motherduck, local]
          must_be: 0
  - name: query_count
    checks:
      - missing:
          must_be: 0
  - name: compute_seconds
    checks:
      - missing:
          must_be: 0
  - name: storage_bytes
    checks:
      - missing:
          must_be: 0
  - name: motherduck_cost_usd

checks:
  - row_count:
      must_be_greater_than: 0
