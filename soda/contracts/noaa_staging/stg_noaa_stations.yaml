dataset: databox/noaa_staging/stg_noaa_stations

columns:
  - name: station_id
    checks:
      - missing:
          must_be: 0
      - duplicate:
          must_be: 0
  - name: station_name
    checks:
      - missing:
          must_be: 0
  - name: latitude
  - name: longitude
  - name: elevation
  - name: min_date
  - name: max_date

checks:
  - row_count:
      must_be_greater_than: 0
  - freshness:
      column: loaded_at
      threshold:
        unit: hour
        must_be_less_than: 25
