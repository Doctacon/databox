dataset: databox/ebird_staging/stg_ebird_hotspots

columns:
  - name: location_id
    checks:
      - missing:
          must_be: 0
      - duplicate:
          must_be: 0
  - name: location_name
    checks:
      - missing:
          must_be: 0
  - name: country_code
  - name: state_code
  - name: latitude
  - name: longitude
  - name: total_species_count
  - name: latest_observation_datetime

checks:
  - row_count:
      must_be_greater_than: 0
