dataset: databox/ebird_staging/stg_ebird_observations

columns:
  - name: submission_id
    checks:
      - missing:
          must_be: 0
      - duplicate:
          must_be: 0
  - name: species_code
    checks:
      - missing:
          must_be: 0
  - name: common_name
    checks:
      - missing:
          must_be: 0
  - name: scientific_name
  - name: location_id
    checks:
      - missing:
          must_be: 0
  - name: location_name
  - name: observation_datetime
    checks:
      - missing:
          must_be: 0
  - name: observation_date
    checks:
      - missing:
          must_be: 0
  - name: count
  - name: latitude
  - name: longitude
  - name: is_valid
  - name: region_code
    checks:
      - missing:
          must_be: 0

checks:
  - row_count:
      must_be_greater_than: 0
  - freshness:
      column: loaded_at
      threshold:
        unit: hour
        must_be_less_than: 25
