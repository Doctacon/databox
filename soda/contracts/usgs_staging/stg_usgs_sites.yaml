dataset: databox/usgs_staging/stg_usgs_sites

columns:
  - name: site_no
    checks:
      - missing:
          must_be: 0
  - name: site_name
  - name: latitude
  - name: longitude

checks:
  - row_count:
      must_be_greater_than: 0
  - freshness:
      column: loaded_at
      threshold:
        unit: hour
        must_be_less_than: 25
