dataset: databox/raw_noaa/stations

columns:
  - name: id
    checks:
      - missing:
          must_be: 0
      - duplicate:
          must_be: 0
  - name: name
    checks:
      - missing:
          must_be: 0
  - name: latitude
  - name: longitude
  - name: elevation
  - name: mindate
  - name: maxdate
  - name: _dlt_load_id
    checks:
      - missing:
          must_be: 0

checks:
  - row_count:
      must_be_greater_than: 0
