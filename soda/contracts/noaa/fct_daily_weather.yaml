dataset: databox/noaa/fct_daily_weather

columns:
  - name: station
    checks:
      - missing:
          must_be: 0
  - name: observation_date
    checks:
      - missing:
          must_be: 0
  - name: location_id
  - name: tmax
  - name: tmin
  - name: prcp
  - name: snow
  - name: awnd

checks:
  - row_count:
      must_be_greater_than: 0
  - freshness:
      column: last_updated_at
      threshold:
        unit: hour
        must_be_less_than: 25
