dataset: databox/ebird/fct_daily_bird_observations

columns:
  - name: region_code
    checks:
      - missing:
          must_be: 0
  - name: observation_date
    checks:
      - missing:
          must_be: 0
  - name: species_code
    checks:
      - missing:
          must_be: 0
  - name: common_name
    checks:
      - missing:
          must_be: 0
  - name: family_common_name
  - name: taxonomic_category
  - name: observation_count
    checks:
      - missing:
          must_be: 0
  - name: submission_count
  - name: location_count

checks:
  - row_count:
      must_be_greater_than: 0
