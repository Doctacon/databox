dataset: databox/ebird/int_ebird_enriched_observations

columns:
  - name: submission_id
    checks:
      - missing:
          must_be: 0
  - name: species_code
    checks:
      - missing:
          must_be: 0
  - name: common_name
    checks:
      - missing:
          must_be: 0
  - name: scientific_name
  - name: family_common_name
  - name: taxonomic_category
  - name: location_id
    checks:
      - missing:
          must_be: 0
  - name: location_name
  - name: observation_datetime
    checks:
      - missing:
          must_be: 0
  - name: observation_date
    checks:
      - missing:
          must_be: 0
  - name: count
  - name: latitude
  - name: longitude

checks:
  - row_count:
      must_be_greater_than: 0
