[project]
name = "databox-cli"
version = "0.2.0"
requires-python = ">=3.12"
dependencies = [
    "databox-config",
    "databox-sources",
    "databox-quality",
    "typer>=0.15.0",
    "rich>=13.9.4",
    "psycopg2-binary>=2.9",
    "sqlmesh>=0.204.0",
]

[project.scripts]
databox = "databox_cli.main:app"

[build-system]
requires = ["setuptools>=70.0.0"]
build-backend = "setuptools.build_meta"

[tool.uv.sources]
databox-config = { workspace = true }
databox-sources = { workspace = true }
databox-quality = { workspace = true }
