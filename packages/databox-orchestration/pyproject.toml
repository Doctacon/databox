[project]
name = "databox-orchestration"
version = "0.2.0"
requires-python = ">=3.12"
dependencies = [
    "databox-config",
    "databox-sources",
    "dagster>=1.5.0",
    "dagster-webserver>=1.5.0",
    "dagster-dlt>=0.1.0",
    "dlt[postgres]>=1.14.1",
]

[build-system]
requires = ["setuptools>=70.0.0"]
build-backend = "setuptools.build_meta"

[tool.uv.sources]
databox-config = { workspace = true }
databox-sources = { workspace = true }
