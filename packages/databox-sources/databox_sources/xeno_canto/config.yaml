source_module: "databox_sources.xeno_canto.source"
description: "Xeno-canto bird sound recording metadata"
schedule:
  cron: "0 6 * * *"
  enabled: true
params:
  query: 'cnt:"United States" loc:"Arizona" grp:birds'
  max_records: 1000
  per_page: 100
quality_rules:
  - column: id
    check: not_null
  - column: english_name
    check: not_null
