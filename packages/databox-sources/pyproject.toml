[project]
name = "databox-sources"
version = "0.2.0"
requires-python = ">=3.12"
dependencies = [
    "databox",
    "dlt[duckdb]>=1.14.1",
    "pendulum>=3.0.0",
    "pydantic>=2.10.4",
    "requests>=2.32.3",
    "structlog>=24.1.0",
]

[build-system]
requires = ["setuptools>=70.0.0"]
build-backend = "setuptools.build_meta"

[tool.uv.sources]
databox = { workspace = true }
