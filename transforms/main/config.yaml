gateways:
  local:
    connection:
      type: duckdb
      extensions:
        - name: h3
          repository: community
      catalogs:
        databox: "{{ env_var('DUCKDB_PATH', 'data/databox.duckdb') }}"
        raw_ebird: "{{ env_var('RAW_EBIRD_PATH', 'data/raw_ebird.duckdb') }}"
        raw_noaa: "{{ env_var('RAW_NOAA_PATH', 'data/raw_noaa.duckdb') }}"
        raw_usgs: "{{ env_var('RAW_USGS_PATH', 'data/raw_usgs.duckdb') }}"
  motherduck:
    connection:
      type: motherduck
      token: "{{ env_var('MOTHERDUCK_TOKEN', '') }}"
      extensions:
        - name: h3
          repository: community
      catalogs:
        databox: "md:databox"
        raw_ebird: "md:raw_ebird"
        raw_noaa: "md:raw_noaa"
        raw_usgs: "md:raw_usgs"

default_gateway: "{{ env_var('DATABOX_GATEWAY', 'local') }}"

model_defaults:
  dialect: duckdb
  start: 2025-07-25
  cron: "@daily"

linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
