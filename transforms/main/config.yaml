gateways:
  postgres:
    connection:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      database: "{{ env_var('POSTGRES_DB', 'databox') }}"
      user: "{{ env_var('POSTGRES_USER', 'databox') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'databox') }}"

default_gateway: postgres

model_defaults:
  dialect: postgres
  start: 2025-07-25
  cron: "@daily"

linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
