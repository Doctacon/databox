          longitude: -100.00
          is_valid: true
          is_reviewed: false
          is_location_private: false
          region_code: "US-XX"
          is_notable: false
          loaded_at: "2025-12-21 10:00:00"
    ebird_staging.stg_ebird_taxonomy:
      rows:
        - species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          taxonomic_order: 1001
          taxonomic_category: "species"
          family_common_name: "Cardinals and Allies"
          family_scientific_name: "Cardinalidae"
          loaded_at: "2025-07-20 10:00:00"
