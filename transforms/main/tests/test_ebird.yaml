test_int_ebird_enriched_observations_joins_and_buckets:
  # Asserts time-of-day + season bucketing, is_flock derivation, taxonomy and
  # hotspot LEFT JOIN behavior (matched + unmatched), and that haversine
  # distance is NULL when the hotspot row is missing. obs1 and its hotspot
  # share lat/lng, so distance_from_hotspot_miles = 0 — avoids hand-deriving
  # haversine values.
  model: ebird.int_ebird_enriched_observations
  inputs:
    ebird_staging.stg_ebird_observations:
      rows:
        - submission_id: "S001"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          location_id: "L123"
          location_name: "Test Park"
          observation_datetime: "2025-07-20 08:30:00"
          observation_date: "2025-07-20"
          observation_year: 2025
          observation_month: 7
          observation_day: 20
          observation_hour: 8
          count: 3
          count_display: "3"
          latitude: 33.45
          longitude: -112.07
          is_valid: true
          is_reviewed: false
          is_location_private: false
          region_code: "US-AZ"
          is_notable: false
          loaded_at: "2025-07-20 10:00:00"
        - submission_id: "S002"
          species_code: "unknwn"
          common_name: "Unknown Species"
          scientific_name: "Unknown sp."
          location_id: "L_NO_HOTSPOT"
          location_name: "Random Spot"
