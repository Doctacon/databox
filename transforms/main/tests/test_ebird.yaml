test_fct_hotspot_species_diversity_shannon_index:
  # Shannon = -SUM(p_i * ln(p_i)). Two species with equal counts at one
  # hotspot → p_i = 0.5 each → H = -2 * 0.5 * ln(0.5) = ln(2) ≈ 0.6931.
  # Single-species hotspot → p = 1 → H = -1 * ln(1) = 0.
  model: ebird.fct_hotspot_species_diversity
  inputs:
    ebird.int_ebird_enriched_observations:
      rows:
        - &int_row
          submission_id: "S001"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          location_id: "L_DIVERSE"
          location_name: "Diverse Spot"
          observation_datetime: "2025-07-20 08:30:00"
          observation_date: "2025-07-20"
          observation_year: 2025
          observation_month: 7
          observation_day: 20
          observation_hour: 8
          count: 1
          count_display: "1"
          latitude: 33.45
          longitude: -112.07
          is_valid: true
          is_reviewed: false
          is_location_private: false
          region_code: "US-AZ"
          is_notable: false
          taxonomic_order: 1001
          taxonomic_category: "species"
          family_common_name: "Cardinals and Allies"
          family_scientific_name: "Cardinalidae"
          country_code: "US"
          state_code: "US-AZ"
          county_code: "US-AZ-013"
          hotspot_total_species: 2
          hotspot_latest_observation: "2025-07-21 00:00:00"
          time_of_day: "Morning"
          season: "Summer"
          is_flock: false
          distance_from_hotspot_miles: 0.0
          loaded_at: "2025-07-20 10:00:00"
        - <<: *int_row
          submission_id: "S002"
          species_code: "blujay"
          common_name: "Blue Jay"
          scientific_name: "Cyanocitta cristata"
          observation_date: "2025-07-21"
          is_notable: true
        - <<: *int_row
          submission_id: "S003"
          location_id: "L_MONO"
          location_name: "Monoculture Spot"
          observation_date: "2025-07-22"
          latitude: 33.50
          longitude: -112.10
          hotspot_total_species: 1
        - <<: *int_row
          submission_id: "S004"
          species_code: "blujay"
          common_name: "Blue Jay"
          scientific_name: "Cyanocitta cristata"
          observation_date: "2025-07-23"
          is_notable: false
  outputs:
    query:
      partial: true
      rows:
        - location_id: "L_DIVERSE"
          total_species_count: 2
          total_observations: 3
          # blujay 2 obs, norcar 1 obs at L_DIVERSE → p = 2/3, 1/3.
          # H = -(2/3*ln(2/3) + 1/3*ln(1/3)) ≈ 0.6365 → ROUND(..,4) = 0.637.
          shannon_diversity_index: 0.637
          most_common_species_code: "blujay"
          peak_season: "Summer"
          pct_notable_observations: 33.3
        - location_id: "L_MONO"
          total_species_count: 1
          total_observations: 1
          shannon_diversity_index: 0.0
          most_common_species_code: "norcar"
          peak_season: "Summer"
          pct_notable_observations: 0.0
