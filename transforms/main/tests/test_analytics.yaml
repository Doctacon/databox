test_fct_bird_weather_daily_pivots_weather_and_joins_birds:
  # az_weather CTE divides raw NOAA values by 10 (tmax/10, tmin/10, prcp/10,
  # awnd/10) and AVGs across stations. Two stations on the same date give
  # station_count=2 and an averaged temperature. Then LEFT JOIN to daily
  # bird observations on observation_date.
  model: analytics.fct_bird_weather_daily
  inputs:
    ebird.fct_daily_bird_observations:
      rows:
        - region_code: "US-AZ"
          observation_date: "2025-07-20"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          family_common_name: "Cardinals and Allies"
          taxonomic_category: "species"
          season: "Summer"
          submission_count: 2
          location_count: 1
          observation_count: 2
          total_birds_counted: 4
          avg_flock_size: 2.0
          max_flock_size: 3
          counted_observations: 2
          presence_only_observations: 0
          pct_counted_observations: 100.0
          morning_observations: 1
          afternoon_observations: 1
          evening_observations: 0
          night_observations: 0
          notable_observations: 0
          flock_observations: 1
          valid_observations: 2
          reviewed_observations: 0
          pct_valid_observations: 100.0
          unique_locations_approx: 1
          avg_observations_per_location: 2.0
          # log10(2+1) * log10(1+1) ≈ 0.477 * 0.301 ≈ 0.14
          popularity_score: 0.14
          first_loaded_at: "2025-07-20 10:00:00"
          last_loaded_at: "2025-07-20 10:00:00"
          last_updated_at: "2025-07-20 10:00:00"
    noaa.fct_daily_weather:
      rows:
        - station: "STATION_A"
          observation_date: "2025-07-20"
          location_id: "FIPS:04"
          tmax: 350.0
          tmin: 200.0
          prcp: 0.0
          snow: 0.0
          awnd: 12.0
          temp_range: 150.0
          observation_count: 5
          missing_value_count: 0
          pct_data_completeness: 100.0
          days_with_tmax_7d: 1
          first_loaded_at: "2025-07-20 10:00:00"
          last_loaded_at: "2025-07-20 10:00:00"
          last_updated_at: "2025-07-20 10:00:00"
        - station: "STATION_B"
          observation_date: "2025-07-20"
          location_id: "FIPS:04"
          tmax: 340.0
          tmin: 210.0
          prcp: 0.0
          snow: 0.0
          awnd: 10.0
          temp_range: 130.0
          observation_count: 5
          missing_value_count: 0
          pct_data_completeness: 100.0
          days_with_tmax_7d: 1
          first_loaded_at: "2025-07-20 10:00:00"
          last_loaded_at: "2025-07-20 10:00:00"
          last_updated_at: "2025-07-20 10:00:00"
  outputs:
    query:
      partial: true
      rows:
        - region_code: "US-AZ"
          observation_date: "2025-07-20"
          species_code: "norcar"
          # avg over 2 stations: tmax ((350+340)/2)/10 = 34.5, tmin ((200+210)/2)/10 = 20.5
          avg_tmax_c: 34.5
          avg_tmin_c: 20.5
          daily_temp_range_c: 14.0
          avg_prcp_mm: 0.0
          avg_wind_ms: 1.1
          is_rainy_day: false
          weather_station_count: 2

test_fct_species_weather_preferences_aggregates_per_species:
  # Two species, two days each. Asserts:
  #  - total_observation_days = COUNT(*) per species (= 2)
  #  - total_observations = SUM(observation_count) per species
  #  - avg_high_temp / avg_low_temp aggregations
  #  - PERCENTILE_CONT(0.25/0.75) — for 2 values [a,b] with a<b: p25 = a + 0.25*(b-a)
  #  - pct_rainy_days = (rainy / total) * 100
  #  - dominant_season picked via DISTINCT ON ranked_seasons (ties broken by
  #    species_code ordering after grouping)
  model: analytics.fct_species_weather_preferences
  inputs:
    analytics.fct_bird_weather_daily:
      rows:
        - region_code: "US-AZ"
          observation_date: "2025-07-20"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          family_common_name: "Cardinals and Allies"
          taxonomic_category: "species"
          season: "Summer"
          observation_count: 10
          submission_count: 5
          location_count: 3
          total_birds_counted: 12
          avg_flock_size: 1.2
          notable_observations: 0
          popularity_score: 0.5
          avg_tmax_c: 30.0
          avg_tmin_c: 18.0
          daily_temp_range_c: 12.0
          avg_prcp_mm: 0.0
          avg_snow_mm: 0.0
          avg_wind_ms: 1.0
          is_rainy_day: false
          weather_station_count: 1
          last_updated_at: "2025-07-20 10:00:00"
        - region_code: "US-AZ"
          observation_date: "2025-07-21"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          family_common_name: "Cardinals and Allies"
          taxonomic_category: "species"
          season: "Summer"
          observation_count: 6
          submission_count: 3
          location_count: 2
          total_birds_counted: 8
          avg_flock_size: 1.3
          notable_observations: 0
          popularity_score: 0.4
          avg_tmax_c: 32.0
          avg_tmin_c: 20.0
          daily_temp_range_c: 12.0
          avg_prcp_mm: 0.5
          avg_snow_mm: 0.0
          avg_wind_ms: 1.5
          is_rainy_day: true
          weather_station_count: 1
          last_updated_at: "2025-07-21 10:00:00"
  outputs:
    query:
      partial: true
      rows:
        - species_code: "norcar"
          common_name: "Northern Cardinal"
          total_observation_days: 2
          total_observations: 16
          avg_high_temp_c: 31.0
          avg_low_temp_c: 19.0
          coldest_day_high_c: 30.0
          hottest_day_high_c: 32.0
          # PERCENTILE_CONT(0.25) of [30, 32] = 30 + 0.25*2 = 30.5
          p25_high_temp_c: 30.5
          # PERCENTILE_CONT(0.75) of [30, 32] = 30 + 0.75*2 = 31.5
          p75_high_temp_c: 31.5
          avg_precip_mm: 0.25
          # 1 rainy day out of 2 = 50.0%
          pct_rainy_days: 50.0
          avg_wind_ms: 1.25
          dominant_season: "Summer"

