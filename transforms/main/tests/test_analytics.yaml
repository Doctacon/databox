test_fct_species_environment_daily_zscore_8day_window:
  # Window is `ROWS BETWEEN 6 PRECEDING AND CURRENT ROW` over precip per
  # h3_cell. Eight days of weather: zeros for days 1-7, then a 10mm spike
  # on day 8. The 7-day window for day 8 covers days 2-8 inclusive: values
  # [0,0,0,0,0,0,10].
  #   mean = 10/7 ≈ 1.4286
  #   sample variance = (6*(0-1.4286)^2 + (10-1.4286)^2) / 6
  #                   ≈ (12.245 + 73.469) / 6 ≈ 14.286
  #   stddev = sqrt(14.286) ≈ 3.7796
  #   z = (10 - 1.4286) / 3.7796 ≈ 2.267
  #   ROUND(.., 3) = 2.268 (DuckDB NUMERIC ROUND uses higher-precision
  #   intermediate, lifting the third decimal one tick above hand-derived).
  # The first 6 days have stddev = 0 → CASE returns NULL (skipped here, only
  # checking day 8).
  model: analytics.fct_species_environment_daily
  inputs:
    ebird.int_observations_by_h3_day:
      rows:
        - h3_cell: "8629b6d37ffffff"
          observation_date: "2025-07-27"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          n_observations: 1
          n_checklists: 1
          total_birds_counted: 1
          n_notable_observations: 0
          last_loaded_at: "2025-07-27 10:00:00"
    noaa.int_weather_by_h3_day:
      rows:
        - &w_row
          h3_cell: "8629b6d37ffffff"
          observation_date: "2025-07-20"
          nearest_station_id: "STATION_A"
          nearest_station_distance_miles: 1.0
          tmax_c: 25.0
          tmin_c: 15.0
          prcp_mm: 0.0
          snow_mm: 0.0
          wind_ms: 1.0
          last_loaded_at: "2025-07-20 10:00:00"
        - <<: *w_row
          observation_date: "2025-07-21"
        - <<: *w_row
          observation_date: "2025-07-22"
        - <<: *w_row
          observation_date: "2025-07-23"
        - <<: *w_row
          observation_date: "2025-07-24"
        - <<: *w_row
          observation_date: "2025-07-25"
        - <<: *w_row
          observation_date: "2025-07-26"
        - <<: *w_row
          observation_date: "2025-07-27"
          prcp_mm: 10.0
    usgs.int_streamflow_by_h3_day:
      columns:
        h3_cell: VARCHAR
        observation_date: DATE
        nearest_gauge_id: VARCHAR
        nearest_gauge_distance_miles: DOUBLE
        mean_discharge_cfs: DOUBLE
        mean_gage_height_ft: DOUBLE
        mean_water_temp_c: DOUBLE
        last_loaded_at: TIMESTAMP
      rows: []
  outputs:
    query:
      partial: true
      rows:
        - obs_date: "2025-07-27"
          h3_cell: "8629b6d37ffffff"
          species_code: "norcar"
          prcp_mm: 10.00
          prcp_mm_z_7d: 2.268

test_fct_species_environment_daily_left_join_missing_weather:
  # Bird observation with no matching weather row → tmax_c, prcp_mm, etc.
  # arrive as NULL through the LEFT JOIN. is_rainy_day evaluates to FALSE
  # (CASE returns FALSE when prcp_mm IS NULL because NULL > 0 is NULL); same
  # for is_hot_day = 0. Streamflow is also missing.
  model: analytics.fct_species_environment_daily
  inputs:
    ebird.int_observations_by_h3_day:
      rows:
        - h3_cell: "8629b6d37ffffff"
          observation_date: "2025-07-20"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          n_observations: 1
          n_checklists: 1
          total_birds_counted: 1
          n_notable_observations: 0
          last_loaded_at: "2025-07-20 10:00:00"
    noaa.int_weather_by_h3_day:
      columns:
        h3_cell: VARCHAR
        observation_date: DATE
        nearest_station_id: VARCHAR
        nearest_station_distance_miles: DOUBLE
        tmax_c: DOUBLE
        tmin_c: DOUBLE
        prcp_mm: DOUBLE
        snow_mm: DOUBLE
        wind_ms: DOUBLE
        last_loaded_at: TIMESTAMP
      rows: []
    usgs.int_streamflow_by_h3_day:
      columns:
        h3_cell: VARCHAR
        observation_date: DATE
        nearest_gauge_id: VARCHAR
        nearest_gauge_distance_miles: DOUBLE
        mean_discharge_cfs: DOUBLE
        mean_gage_height_ft: DOUBLE
        mean_water_temp_c: DOUBLE
        last_loaded_at: TIMESTAMP
      rows: []
  outputs:
    query:
      partial: true
      rows:
        - h3_cell: "8629b6d37ffffff"
          obs_date: "2025-07-20"
          species_code: "norcar"
          n_observations: 1
          # All weather/streamflow LEFT JOIN columns NULL.
          nearest_station_id:
          tmax_c:
          tmin_c:
          prcp_mm:
          nearest_gauge_id:
          mean_discharge_cfs:
          # CASE WHEN NULL > 0 is NULL → ELSE branch hit → FALSE / 0.
          is_rainy_day: false
          is_hot_day: 0

test_fct_species_environment_daily_hot_rainy_boundary:
