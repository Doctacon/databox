        - load_id: "quake-1"
          schema_name: "main"
          status: 0
          inserted_at: "2025-07-20 09:45:00"
    raw_usgs_earthquakes.main.events:
      rows:
        - _dlt_load_id: "quake-1"
  outputs:
    query:
      partial: true
      rows:
        - source: "ebird"
          load_id: "ebird-new"
          status: 0
          status_label: "success"
          rows_loaded: 3
        - source: "noaa"
          load_id: "noaa-1"
          status: 0
          status_label: "success"
          rows_loaded: 2
        - source: "usgs"
          load_id: "usgs-1"
          status: 1
          status_label: "failed"
          rows_loaded: 0
        - source: "usgs_earthquakes"
          load_id: "quake-1"
          status: 0
          status_label: "success"
          rows_loaded: 1
