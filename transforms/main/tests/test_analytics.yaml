  # (prcp_mm > 0 → TRUE):
  #  - day 1: tmax_c = 30.0  → is_hot_day = 1 (boundary)
  #  - day 1: prcp_mm = 0.0  → is_rainy_day = FALSE (strict >)
  #  - day 2: tmax_c = 29.9  → is_hot_day = 0 (just below)
  #  - day 2: prcp_mm = 0.1  → is_rainy_day = TRUE (just above)
  model: analytics.fct_species_environment_daily
  inputs:
    ebird.int_observations_by_h3_day:
      rows:
        - h3_cell: "8629b6d37ffffff"
          observation_date: "2025-07-20"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          n_observations: 1
          n_checklists: 1
          total_birds_counted: 1
          n_notable_observations: 0
          last_loaded_at: "2025-07-20 10:00:00"
        - h3_cell: "8629b6d37ffffff"
          observation_date: "2025-07-21"
          species_code: "norcar"
          common_name: "Northern Cardinal"
          scientific_name: "Cardinalis cardinalis"
          n_observations: 1
          n_checklists: 1
          total_birds_counted: 1
          n_notable_observations: 0
          last_loaded_at: "2025-07-21 10:00:00"
    noaa.int_weather_by_h3_day:
      rows:
        - h3_cell: "8629b6d37ffffff"
          observation_date: "2025-07-20"
          nearest_station_id: "STATION_A"
          nearest_station_distance_miles: 1.0
          tmax_c: 30.0
          tmin_c: 18.0
          prcp_mm: 0.0
          snow_mm: 0.0
          wind_ms: 1.0
          last_loaded_at: "2025-07-20 10:00:00"
        - h3_cell: "8629b6d37ffffff"
          observation_date: "2025-07-21"
          nearest_station_id: "STATION_A"
          nearest_station_distance_miles: 1.0
          tmax_c: 29.9
          tmin_c: 17.5
          prcp_mm: 0.1
          snow_mm: 0.0
          wind_ms: 1.0
          last_loaded_at: "2025-07-21 10:00:00"
    usgs.int_streamflow_by_h3_day:
      columns:
        h3_cell: VARCHAR
        observation_date: DATE
        nearest_gauge_id: VARCHAR
        nearest_gauge_distance_miles: DOUBLE
        mean_discharge_cfs: DOUBLE
        mean_gage_height_ft: DOUBLE
        mean_water_temp_c: DOUBLE
        last_loaded_at: TIMESTAMP
      rows: []
  outputs:
    query:
      partial: true
      rows:
        - obs_date: "2025-07-20"
          tmax_c: 30.0
          prcp_mm: 0.00
          is_hot_day: 1
          is_rainy_day: false
        - obs_date: "2025-07-21"
          tmax_c: 29.9
          prcp_mm: 0.10
          is_hot_day: 0
          is_rainy_day: true

test_platform_health_picks_latest_per_source:
  # Per source, ROW_NUMBER() OVER (PARTITION BY source ORDER BY completed_at
  # DESC) picks rn=1 — the freshest load. Two ebird loads provided, only the
  # later one should appear. Other sources have one load each. Asserts
  # status_label mapping (status=0 → 'success', otherwise 'failed') and
  # rows_loaded LEFT JOIN sums up upstream raw row counts for that load_id.
  model: analytics.platform_health
  inputs:
    raw_ebird.main._dlt_loads:
      rows:
        - load_id: "ebird-old"
          schema_name: "main"
          status: 0
          inserted_at: "2025-07-19 10:00:00"
        - load_id: "ebird-new"
          schema_name: "main"
          status: 0
          inserted_at: "2025-07-20 10:00:00"
    raw_ebird.main.recent_observations:
      rows:
        - _dlt_load_id: "ebird-new"
        - _dlt_load_id: "ebird-new"
        - _dlt_load_id: "ebird-new"
    raw_ebird.main.notable_observations:
      columns:
        _dlt_load_id: VARCHAR
      rows: []
    raw_ebird.main.hotspots:
      columns:
        _dlt_load_id: VARCHAR
      rows: []
    raw_ebird.main.species_list:
      columns:
        _dlt_load_id: VARCHAR
      rows: []
    raw_noaa.main._dlt_loads:
      rows:
        - load_id: "noaa-1"
          schema_name: "main"
          status: 0
          inserted_at: "2025-07-20 09:00:00"
    raw_noaa.main.daily_weather:
      rows:
        - _dlt_load_id: "noaa-1"
        - _dlt_load_id: "noaa-1"
    raw_noaa.main.stations:
