name: CI

# Path-based routing: docs-only PRs skip the heavy matrix. Any source-related
# change runs the complete registry-derived source matrix; pushes to main and
# workflow changes run the full matrix. See docs/ci.md for details.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      notebooks: ${{ steps.filter.outputs.notebooks }}
      source_related: ${{ steps.filter.outputs.source_related }}
      cross_cutting: ${{ steps.filter.outputs.cross_cutting }}
      ci_config: ${{ steps.filter.outputs.ci_config }}
      needs_full: ${{ steps.compose.outputs.needs_full }}
      needs_any_source: ${{ steps.compose.outputs.needs_any_source }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - '*.md'
              - 'mkdocs.yml'
            source_related:
              - 'packages/databox-sources/**'
              - 'packages/databox/databox/config/sources.py'
              - 'packages/databox/databox/destinations/**'
              - 'packages/databox/databox/orchestration/**'
              - 'scripts/**'
              - 'tests/**'
              - '.github/workflows/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Taskfile.yaml'
              - '.pre-commit-config.yaml'
            cross_cutting:
              - 'packages/databox/**'
              - 'packages/databox-sources/databox_sources/__init__.py'
              - 'packages/databox-sources/databox_sources/_*.py'
              - 'packages/databox-sources/databox_sources/base.py'
              - 'packages/databox-sources/databox_sources/registry.py'
              - 'scripts/**'
              - 'tests/**'
              - 'transforms/main/models/analytics/**'
              - 'soda/contracts/analytics/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Taskfile.yaml'
              - '.pre-commit-config.yaml'
            ci_config:
              - '.github/workflows/**'
      - id: compose
        run: |
          if [[ "${{ github.event_name }}" == "push" \
              || "${{ steps.filter.outputs.cross_cutting }}" == "true" \
              || "${{ steps.filter.outputs.ci_config }}" == "true" ]]; then
            echo "needs_full=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_full=false" >> "$GITHUB_OUTPUT"
          fi
          echo "needs_any_source=${{ steps.filter.outputs.source_related }}" >> "$GITHUB_OUTPUT"

  lint:
    name: Ruff (lint + format)
    needs: changes
    if: needs.changes.outputs.needs_full == 'true' || needs.changes.outputs.needs_any_source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: mypy
    needs: changes
    if: needs.changes.outputs.needs_full == 'true' || needs.changes.outputs.needs_any_source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: mypy
        run: uv run mypy packages/

  tests-core:
    name: pytest (core)
    needs: changes
    if: needs.changes.outputs.needs_full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: pytest core (tests/ + packages/databox)
        # Shard runs drop --cov-fail-under; the monolithic `tests-all` job
        # enforces the 70% floor against the whole workspace (where each
        # source package is actually exercised).
        run: uv run pytest tests packages/databox -o "testpaths=tests packages/databox" -o "addopts=-v --tb=short --cov --cov-report=term-missing"

  source-matrix:
    name: Build source test matrix
    needs: changes
    if: needs.changes.outputs.needs_full == 'true' || needs.changes.outputs.needs_any_source == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: Run shared source harness offline
        run: >-
          uv run pytest packages/databox-sources/tests/test_*.py
          -o "testpaths=packages/databox-sources/tests"
          -o "addopts=-v --tb=short --record-mode=none --block-network"
      - name: Validate source contract and emit matrix
        id: matrix
        run: echo "matrix=$(uv run python scripts/source_ci.py matrix)" >> "$GITHUB_OUTPUT"

  tests-sources:
    name: pytest (${{ matrix.source }}, ${{ matrix.profile }})
    needs: [changes, source-matrix]
    if: needs.changes.outputs.needs_full == 'true' || needs.changes.outputs.needs_any_source == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.source-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: Run source profile offline
        run: >-
          uv run pytest packages/databox-sources/tests/${{ matrix.source }}
          -o "testpaths=packages/databox-sources/tests/${{ matrix.source }}"
          -o "addopts=-v --tb=short --cov --cov-report=term-missing --record-mode=none --block-network"

  tests-all:
    # Coverage-floor gate. Core and each registry source run in isolated
    # sequential coverage processes so VCR/dlt clients cannot leak state.
    # The accumulated .coverage file is then reported with `--fail-under=70`.
    name: pytest (all, coverage floor)
    needs: changes
    if: needs.changes.outputs.needs_full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: Erase previous coverage
        run: uv run coverage erase
      - name: Coverage — core (tests/ + packages/databox)
        run: uv run coverage run --append -m pytest tests packages/databox -o "testpaths=tests packages/databox" -o "addopts=-v --tb=short"
      - name: Coverage — all registry sources, isolated and offline
        run: uv run python scripts/source_ci.py coverage
      - name: Coverage report (fail under 70%)
        run: uv run coverage report --fail-under=70 --show-missing

  sqlmesh-lint:
    name: SQLMesh lint
    needs: changes
    if: needs.changes.outputs.needs_full == 'true' || needs.changes.outputs.needs_any_source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: sqlmesh lint
        run: uv run sqlmesh --paths transforms/main lint

  source-layout-lint:
    name: Source layout lint
    # Always required — cheap, and the layout is the invariant for scaling sources.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: Verify every source follows the standard layout
        run: uv run python scripts/check_source_layout.py

  staging-codegen-drift:
    name: Staging codegen drift
    needs: changes
    if: needs.changes.outputs.needs_full == 'true' || needs.changes.outputs.needs_any_source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: Check generated staging SQL matches contracts
        run: uv run python scripts/generate_staging.py --check
      - name: Check generated platform_health.sql matches source registry
        run: uv run python scripts/generate_platform_health.py --check

  schema-contract-gate:
    name: Schema contract gate
    # Always required on PRs — the gate is cheap and protects downstream consumers.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: Write PR body to file
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > /tmp/pr_body.txt
      - name: Run schema-contract gate
        run: |
          uv run python scripts/schema_gate.py \
            --base origin/${{ github.base_ref }} \
            --pr-body-file /tmp/pr_body.txt

  soda-validate:
    name: Soda contract structure
    needs: changes
    if: needs.changes.outputs.needs_full == 'true' || needs.changes.outputs.needs_any_source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install
        run: uv sync --all-extras --dev
      - name: Validate Soda contract YAML structure
        # Soda CLI requires a live data source; no schema-only mode exists.
        # This job statically validates every contract parses as YAML and has
        # the two required top-level keys. Live `soda contract verify` runs as
        # a Dagster asset check after materialization (see observability-pass ticket).
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import sys, yaml

          root = Path("soda/contracts")
          required = ("dataset", "columns")
          errors: list[str] = []
          files = sorted(list(root.rglob("*.yaml")) + list(root.rglob("*.yml")))
          if not files:
              sys.exit("no Soda contracts found under soda/contracts/")
          for p in files:
              try:
                  doc = yaml.safe_load(p.read_text())
              except yaml.YAMLError as e:
                  errors.append(f"{p}: YAML parse error: {e}")
                  continue
              if not isinstance(doc, dict):
                  errors.append(f"{p}: top-level is not a mapping")
                  continue
              for key in required:
                  if key not in doc:
                      errors.append(f"{p}: missing required top-level key '{key}'")
          if errors:
              print("Soda contract validation failed:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print(f"All {len(files)} Soda contracts have valid structure.")
          PY
