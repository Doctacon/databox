site_name: Databox Data Dictionary
site_description: Auto-generated data dictionary and lineage for the Databox platform.
site_url: https://doctacon.github.io/databox/
repo_url: https://github.com/Doctacon/databox
repo_name: Doctacon/databox
edit_uri: ""

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Data dictionary:
      - Overview: dictionary/index.md
      - Lineage: dictionary/lineage.md
  - Analytics examples: analytics-examples.md
  - Metrics: metrics.md
  - Examples:
      - Metrics demo: examples/metrics-demo.md
  - Contracts: contracts.md
  - Staging codegen: staging.md
  - Source layout: source-layout.md
  - New source generator: new-source.md
  - Forking the scaffold: template.md
  - CI routing: ci.md
  - Configuration: configuration.md
  - Secrets: secrets.md
  - Environments: environments.md
  - Freshness SLAs: freshness.md
  - Cost & usage: cost.md
  - Incident runbook: runbook.md
  - Commands: commands.md
  - Incremental loading: incremental-loading.md
  - Architecture decisions:
      - Overview: adr/README.md
      - ADR-0001 DuckDB warehouse: adr/0001-duckdb-as-primary-warehouse.md
      - ADR-0002 SQLMesh over dbt: adr/0002-sqlmesh-over-dbt.md
      - ADR-0003 Single SQLMesh project: adr/0003-single-sqlmesh-project.md
      - ADR-0004 Per-source raw catalogs: adr/0004-per-source-raw-catalogs.md
      - ADR-0005 Dagster sole orchestrator: adr/0005-dagster-as-sole-orchestrator.md
      - ADR-0006 MotherDuck cloud path: adr/0006-motherduck-as-cloud-path.md
