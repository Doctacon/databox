version: '3'

# Only targets that compose, inject env, or encode a non-obvious default.
# Pure CLI wrappers (uv/sqlmesh/dagster) live in docs/commands.md.

vars: { VENV_DIR: .venv }
env:
  PYTHONPATH: .
  RUNTIME__DLTHUB_TELEMETRY: "false"
  SQLMESH__DISABLE_ANONYMIZED_ANALYTICS: "true"

tasks:
  install:
    desc: "Bootstrap .venv, copy .env, uv sync, install pre-commit hook"
    cmds:
      - test -d {{.VENV_DIR}} || uv venv {{.VENV_DIR}}
      - test -f .env || cp .env.example .env
      - uv sync
      - ./scripts/setup_pre_commit.sh
      # Route SQLMesh's hard-coded `logs/` dir into `.logs/sqlmesh/` so the
      # repo keeps one log root. No equivalent env var / config knob exists
      # in SQLMesh — the symlink is the least-ugly option.
      - mkdir -p .logs/sqlmesh
      - test -e transforms/main/logs || ln -s ../../.logs/sqlmesh transforms/main/logs
    sources: [pyproject.toml, uv.lock, scripts/setup_pre_commit.sh]

  ci:
    desc: "Every CI gate: ruff + mypy + pytest + secret scan + staging drift"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/ruff check ."
      - "{{.VENV_DIR}}/bin/ruff format --check ."
      - "{{.VENV_DIR}}/bin/mypy packages/"
      - "{{.VENV_DIR}}/bin/pytest"
      - "{{.VENV_DIR}}/bin/python scripts/check_secrets.py ."
      - "{{.VENV_DIR}}/bin/python scripts/generate_staging.py --check"
      - "{{.VENV_DIR}}/bin/python scripts/generate_platform_health.py --check"

  docs:build:
    desc: "Generate dictionary, build MkDocs (strict)"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/python scripts/generate_docs.py"
      - "{{.VENV_DIR}}/bin/mkdocs build --strict"

  plan:dev:
    desc: "SQLMesh plan against the dev virtual env (interactive)"
    dir: transforms/main
    cmds: ["../../{{.VENV_DIR}}/bin/sqlmesh plan dev {{.CLI_ARGS}}"]
  plan:prod:
    desc: "SQLMesh plan against prod — fails if prod is ahead of dev"
    dir: transforms/main
    cmds: ["../../{{.VENV_DIR}}/bin/sqlmesh plan prod {{.CLI_ARGS}}"]
  promote:
    desc: "Auto-apply dev → prod promotion (assumes dev verified)"
    dir: transforms/main
    cmds: ["../../{{.VENV_DIR}}/bin/sqlmesh plan prod --auto-apply {{.CLI_ARGS}}"]
  verify:dev:
    desc: "Run every Soda contract against the __dev schemas"
    cmds: ["{{.VENV_DIR}}/bin/python scripts/verify_dev.py"]
  eval:agent:
    desc: "Run deterministic DeepEval checks for the Birding Trip Copilot"
    env:
      CONFIDENT_OPEN_BROWSER: "false"
      DEEPEVAL_CACHE_FOLDER: ".cache/deepeval"
      DEEPEVAL_TELEMETRY_OPT_OUT: "true"
      PYTEST_ADDOPTS: "--no-cov"
    cmds: ["{{.VENV_DIR}}/bin/deepeval test run tests/evals/test_birding_trip_copilot_deepeval.py"]

  full-refresh:
    desc: "Dagster dlt source assets through Quack, then native SQLMesh prod restatement — logs to .logs/"
    env: { DAGSTER_HOME: "{{.USER_WORKING_DIR}}/.dagster", DATABOX_BACKEND: "quack" }
    cmds:
      - |
        ./scripts/run-logged.sh full-refresh -- bash -lc '
          set -euo pipefail
          repo=$PWD
          tmp=$(mktemp -d)
          cleanup() { rm -rf "$tmp" "$repo/data/.quack-clients"; }
          trap cleanup EXIT
          export DATABOX_BACKEND=quack RUNTIME__DLTHUB_TELEMETRY=false SQLMESH__DISABLE_ANONYMIZED_ANALYTICS=true PYTHONPATH="$repo${PYTHONPATH:+:$PYTHONPATH}"
          export VIRTUAL_ENV="$repo/{{.VENV_DIR}}"
          export PATH="$VIRTUAL_ENV/bin:$PATH"
          for job in ebird_ingest gbif_ingest xeno_canto_ingest noaa_ingest usgs_ingest usgs_earthquakes_ingest; do
            (cd "$tmp" && "$repo/{{.VENV_DIR}}/bin/dg" launch --target-path "$repo/packages/databox" --job "$job")
          done
          "$repo/scripts/sqlmesh_plan_prod.sh"
        '
  verify:
    desc: "Smoke Dagster dlt source assets through Quack, then native SQLMesh prod restatement — logs to .logs/"
    env: { DAGSTER_HOME: "{{.USER_WORKING_DIR}}/.dagster", DATABOX_BACKEND: "quack", DATABOX_SMOKE: "1" }
    cmds:
      - |
        ./scripts/run-logged.sh verify -- bash -lc '
          set -euo pipefail
          repo=$PWD
          tmp=$(mktemp -d)
          cleanup() { rm -rf "$tmp" "$repo/data/.quack-clients"; }
          trap cleanup EXIT
          export DATABOX_BACKEND=quack DATABOX_SMOKE=1 RUNTIME__DLTHUB_TELEMETRY=false SQLMESH__DISABLE_ANONYMIZED_ANALYTICS=true PYTHONPATH="$repo${PYTHONPATH:+:$PYTHONPATH}"
          export VIRTUAL_ENV="$repo/{{.VENV_DIR}}"
          export PATH="$VIRTUAL_ENV/bin:$PATH"
          for job in ebird_ingest gbif_ingest xeno_canto_ingest noaa_ingest usgs_ingest usgs_earthquakes_ingest; do
            (cd "$tmp" && "$repo/{{.VENV_DIR}}/bin/dg" launch --target-path "$repo/packages/databox" --job "$job")
          done
          "$repo/scripts/sqlmesh_plan_prod.sh"
        '
  dagster:dev:
    desc: "Launch Dagster UI on the default Quack backend"
    env: { DAGSTER_HOME: "{{.USER_WORKING_DIR}}/.dagster", DATABOX_BACKEND: "quack" }
    cmds:
      - |
        bash -lc '
          set -euo pipefail
          repo=$PWD
          tmp=$(mktemp -d)
          cleanup() { rm -rf "$tmp"; }
          trap cleanup EXIT
          export DATABOX_BACKEND=quack RUNTIME__DLTHUB_TELEMETRY=false SQLMESH__DISABLE_ANONYMIZED_ANALYTICS=true PYTHONPATH="$repo${PYTHONPATH:+:$PYTHONPATH}"
          export VIRTUAL_ENV="$repo/{{.VENV_DIR}}"
          export PATH="$VIRTUAL_ENV/bin:$PATH"
          cd "$tmp"
          "$repo/{{.VENV_DIR}}/bin/dg" dev --target-path "$repo/packages/databox" --use-active-venv {{.CLI_ARGS}}
        '

  streamlit:
    desc: "Launch Databox Explorer"
    dir: app
    cmds: ["../{{.VENV_DIR}}/bin/streamlit run main.py"]
  init:
    desc: "Rebrand a fresh fork from scaffold.yaml (see docs/template.md)"
    cmds: ["{{.VENV_DIR}}/bin/python scripts/bootstrap.py {{.CLI_ARGS}}"]
  new-source:
    desc: "Scaffold a new dlt source (see docs/new-source.md)"
    cmds: ["{{.VENV_DIR}}/bin/python scripts/new_source.py {{.CLI_ARGS}}"]

  db:reset:
    desc: "Delete local DuckDB files (MotherDuck dbs must be dropped manually)"
    cmds: ["rm -rf data/*.duckdb data/*.duckdb.wal data/.quack-clients"]
  clean:
    desc: "Remove build + test + cache artifacts"
    cmds:
      - >-
        rm -rf build/ dist/ *.egg-info/ .pytest_cache/ .coverage htmlcov/
        .mypy_cache/ .ruff_cache/ site/ logs/
        packages/databox/data/ transforms/main/data/ transforms/main/.cache/
        .dive-preview/node_modules/ .dive-preview/.env
        .dagster_state/ .dlt_state/ .duckdb_state/ .sqlmesh_state/
      - >-
        find . \( -path ./.git -o -path ./{{.VENV_DIR}} -o -path ./data -o -path ./.dagster -o -path ./.logs \) -prune
        -o -type d \( -name __pycache__ -o -name '*.egg-info' \) -exec rm -rf {} +
  clean-all:
    desc: "Clean + drop .venv and data/"
    deps: [clean]
    cmds: ["rm -rf {{.VENV_DIR}} data"]
