version: '3'

vars:
  PROJECT_NAME: databox
  PYTHON_VERSION: "3.12"
  VENV_DIR: .venv
  DATA_DIR: ./data

env:
  PYTHONPATH: .

output: prefixed

tasks:
  setup:
    desc: "Setup development environment"
    cmds:
      - uv venv {{.VENV_DIR}}
      - uv pip install -e .
      - cp -n .env.example .env
    sources:
      - pyproject.toml
      - .env.example
    generates:
      - "{{.VENV_DIR}}/pyvenv.cfg"
    status:
      - test -d {{.VENV_DIR}}

  install:
    desc: "Install project dependencies"
    deps: [setup]
    cmds:
      - uv pip install -e .
      - ./scripts/setup_pre_commit.sh
    sources:
      - pyproject.toml
      - uv.lock
      - scripts/setup_pre_commit.sh

  lint:
    desc: "Run code linting"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/ruff check . --fix --unsafe-fixes"

  format:
    desc: "Format code"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/ruff format ."
      - "{{.VENV_DIR}}/bin/ruff check . --fix"

  typecheck:
    desc: "Run type checking"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/mypy . --ignore-missing-imports"

  test:
    desc: "Run all tests"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest"

  test:unit:
    desc: "Run unit tests only"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest -m unit"

  test:integration:
    desc: "Run integration tests"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest -m integration"

  test:e2e:
    desc: "Run end-to-end tests"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest -m e2e"

  test:coverage:
    desc: "Run tests with coverage"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest --cov=. --cov-report=html"

  check-secrets:
    desc: "Check for secrets in code"
    cmds:
      - python scripts/check_secrets.py {{.CLI_ARGS | default "."}}

  pre-commit:
    desc: "Run pre-commit hooks"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pre-commit run --all-files"

  # Pipeline commands (via CLI)
  pipeline:list:
    desc: "List registered pipelines"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/databox list"

  pipeline:run:
    desc: "Run a pipeline by name (pass name via -- <name>)"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/databox run {{.CLI_ARGS}}"

  pipeline:ebird:
    desc: "Run eBird pipeline (shorthand)"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/databox run ebird"

  # Transform commands (via CLI)
  transform:plan:
    desc: "Plan SQLMesh transformations"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/databox transform plan {{.CLI_ARGS}}"

  transform:run:
    desc: "Apply SQLMesh transformations"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/databox transform run {{.CLI_ARGS}}"

  transform:test:
    desc: "Run SQLMesh tests"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/databox transform test {{.CLI_ARGS}}"

  transform:ui:
    desc: "Start SQLMesh UI"
    deps: [install]
    dir: transformations/ebird
    cmds:
      - "../../{{.VENV_DIR}}/bin/sqlmesh ui"

  # Quality & Status
  quality:
    desc: "Run quality checks on a table (pass schema.table)"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/databox quality {{.CLI_ARGS}}"

  status:
    desc: "Show pipeline status and data freshness"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/databox status"

  # Production
  prod:
    desc: "Start production workflow"
    deps: [install, pre-commit]
    cmds:
      - echo "Production environment ready!"
      - echo "Commands:"
      - echo "  databox run <pipeline>"
      - echo "  databox transform plan"
      - echo "  databox status"

  # CI/CD
  ci:
    desc: "Run all CI checks"
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - task: check-secrets

  # Clean
  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf build/
      - rm -rf dist/
      - rm -rf *.egg-info/
      - rm -rf .pytest_cache/
      - rm -rf .coverage
      - rm -rf htmlcov/
      - find . -type d -name __pycache__ -exec rm -rf {} +
      - find . -type f -name "*.pyc" -delete

  clean-all:
    desc: "Clean everything including venv and data"
    deps: [clean]
    cmds:
      - rm -rf {{.VENV_DIR}}
      - rm -rf {{.DATA_DIR}}
      - rm -rf .dlt/

  db:reset:
    desc: "Reset the database"
    cmds:
      - rm -f data/databox.db
      - echo "Database reset complete"

  # Full refresh
  full-refresh:
    desc: "Full data refresh — run all pipelines and transforms"
    cmds:
      - task: pipeline:run -- ebird
      - task: transform:plan
      - task: transform:run
      - task: transform:test

  # Dagster
  dagster:dev:
    desc: "Start Dagster development server"
    deps: [install-orchestration]
    dir: orchestration
    env:
      DAGSTER_HOME: "{{.ROOT_DIR}}/.dagster"
    cmds:
      - "../{{.VENV_DIR}}/bin/dagster dev -f dagster_project.py"

  install-orchestration:
    desc: "Install orchestration dependencies"
    deps: [install]
    cmds:
      - uv pip install -e '.[orchestration]'
    sources:
      - pyproject.toml

  # Streamlit
  streamlit:
    desc: "Start Streamlit dashboard"
    deps: [install]
    dir: apps/ebird_streamlit
    cmds:
      - "../../{{.VENV_DIR}}/bin/streamlit run main.py"

  # Watch
  watch:lint:
    desc: "Watch files and run linting"
    deps: [install]
    watch: true
    sources:
      - "**/*.py"
    cmds:
      - task: lint

  watch:test:
    desc: "Watch files and run tests"
    deps: [install]
    watch: true
    sources:
      - "**/*.py"
    cmds:
      - task: test

  default:
    desc: "Show available tasks"
    cmds:
      - task --list-all
