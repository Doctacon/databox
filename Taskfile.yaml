version: '3'

vars:
  PROJECT_NAME: databox
  PYTHON_VERSION: "3.12"
  VENV_DIR: .venv
  DATA_DIR: ./data

env:
  PYTHONPATH: .

output: prefixed

tasks:
  setup:
    desc: "Setup development environment"
    cmds:
      - uv venv {{.VENV_DIR}}
      - uv sync
      - test -f .env || cp .env.example .env
    sources:
      - pyproject.toml
      - .env.example
    generates:
      - "{{.VENV_DIR}}/pyvenv.cfg"
    status:
      - test -d {{.VENV_DIR}}

  install:
    desc: "Install project dependencies"
    deps: [setup]
    cmds:
      - uv sync
      - ./scripts/setup_pre_commit.sh
    sources:
      - pyproject.toml
      - uv.lock
      - scripts/setup_pre_commit.sh

  lint:
    desc: "Run code linting"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/ruff check . --fix --unsafe-fixes"

  format:
    desc: "Format code"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/ruff format ."
      - "{{.VENV_DIR}}/bin/ruff check . --fix"

  typecheck:
    desc: "Run type checking"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/mypy . --ignore-missing-imports"

  test:
    desc: "Run all tests"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest"

  test:unit:
    desc: "Run unit tests only"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest -m unit"

  test:integration:
    desc: "Run integration tests"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest -m integration"

  test:e2e:
    desc: "Run end-to-end tests"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest -m e2e"

  test:coverage:
    desc: "Run tests with coverage"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pytest --cov=. --cov-report=html"

  check-secrets:
    desc: "Check for secrets in code"
    cmds:
      - python scripts/check_secrets.py {{.CLI_ARGS | default "."}}

  pre-commit:
    desc: "Run pre-commit hooks"
    deps: [install]
    cmds:
      - "{{.VENV_DIR}}/bin/pre-commit run --all-files"

  # Transform commands (sqlmesh directly — useful for dev/debugging)
  transform:plan:
    desc: "Plan SQLMesh transformations"
    deps: [install]
    dir: transforms/main
    cmds:
      - "../../{{.VENV_DIR}}/bin/sqlmesh plan --auto-apply {{.CLI_ARGS}}"

  transform:run:
    desc: "Run SQLMesh transformations"
    deps: [install]
    dir: transforms/main
    cmds:
      - "../../{{.VENV_DIR}}/bin/sqlmesh run {{.CLI_ARGS}}"

  transform:test:
    desc: "Run SQLMesh tests"
    deps: [install]
    dir: transforms/main
    cmds:
      - "../../{{.VENV_DIR}}/bin/sqlmesh test {{.CLI_ARGS}}"

  transform:ui:
    desc: "Start SQLMesh UI"
    deps: [install]
    dir: transforms/main
    cmds:
      - "../../{{.VENV_DIR}}/bin/sqlmesh ui"

  # CI/CD
  ci:
    desc: "Run all CI checks"
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - task: check-secrets

  # Clean
  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf build/
      - rm -rf dist/
      - rm -rf *.egg-info/
      - rm -rf .pytest_cache/
      - rm -rf .coverage
      - rm -rf htmlcov/
      - find . -type d -name __pycache__ -exec rm -rf {} +
      - find . -type f -name "*.pyc" -delete

  clean-all:
    desc: "Clean everything including venv and data"
    deps: [clean]
    cmds:
      - rm -rf {{.VENV_DIR}}
      - rm -rf {{.DATA_DIR}}
      - rm -rf .dlt_state/

  db:reset:
    desc: "Reset the database"
    cmds:
      - rm -f data/databox.duckdb
      - echo "Database reset complete"

  # Full refresh
  full-refresh:
    desc: "Full data refresh — all pipelines + transforms + quality checks via Dagster"
    cmds:
      - task: dagster:materialize

  # Dagster
  dagster:dev:
    desc: "Start Dagster development server"
    deps: [install]
    env:
      DAGSTER_HOME: "{{.USER_WORKING_DIR}}/.dagster"
      PYTHONPATH: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.VENV_DIR}}/bin/dagster dev -f packages/databox-orchestration/databox_orchestration/definitions.py"

  dagster:materialize:
    desc: "Materialize all Dagster assets (runs all pipelines + transforms + quality checks)"
    deps: [install]
    env:
      DAGSTER_HOME: "{{.USER_WORKING_DIR}}/.dagster"
      PYTHONPATH: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.VENV_DIR}}/bin/dagster asset materialize --select '*' -f packages/databox-orchestration/databox_orchestration/definitions.py"

  verify:
    desc: "Smoke test via Dagster — limited ingest (5 items/resource) + last 3 days of transforms"
    deps: [install]
    env:
      DAGSTER_HOME: "{{.USER_WORKING_DIR}}/.dagster"
      PYTHONPATH: "{{.USER_WORKING_DIR}}"
      DATABOX_SMOKE: "1"
    cmds:
      - "{{.VENV_DIR}}/bin/dagster asset materialize --select '*' -f packages/databox-orchestration/databox_orchestration/definitions.py"

  # Streamlit
  streamlit:
    desc: "Start Databox Explorer dashboard"
    deps: [install]
    dir: app
    cmds:
      - "../{{.VENV_DIR}}/bin/streamlit run main.py"

  # Watch
  watch:lint:
    desc: "Watch files and run linting"
    deps: [install]
    watch: true
    sources:
      - "**/*.py"
    cmds:
      - task: lint

  watch:test:
    desc: "Watch files and run tests"
    deps: [install]
    watch: true
    sources:
      - "**/*.py"
    cmds:
      - task: test

  default:
    desc: "Show available tasks"
    cmds:
      - task --list-all
