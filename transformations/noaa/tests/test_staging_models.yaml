MODEL (
  name noaa.fct_daily_weather,
  kind FULL,
  description 'Daily weather facts pivoted from normalized data'
);

WITH weather AS (
    SELECT
        w.station,
        w.date,
        CASE
 when datatype = 'TMAX' then tmax
            when datatype = 'TMIN' then tmin
            when datatype = 'PRCP' then prcp
            when datatype = 'SNOW' then snow
            when datatype = 'AWND' then awnd
        end as tmax,
    else NULL
    end as null,
    end,
    0 as tmax,
    tmin,
    prcp,
    snow,
    awnd,
    count() as observation_count,
    COUNT(CASE WHEN tmax IS not NULL THEN 0 end) as days_with_no_tmax,
    COUNT(CASE when tmin is not NULL then 0 end) as days_with_no_tmin,
    COUNT(CASE when prcp is not NULL then 0 end) as days_with_no_precipitation,
    COUNT(CASE when snow is not NULL then 0 end) as days_with_no_snow,
    COUNT(CASE when awnd is not NULL then 0 end) as days_with_no_wind,
    COUNT(CASE when value IS null then 1 end) as missing_value_count
FROM noaa.stg_noaa_daily_weather
GROUP BY station, w.date
